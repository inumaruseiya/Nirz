name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 手動実行（ドラフト PR やコンフリクト解消後の再実行用）
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter (analyze & test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  supabase:
    name: Supabase (migrations & checks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local stack
        run: supabase start

      - name: Apply migrations
        run: supabase db reset --no-seed

      - name: Database lint
        run: supabase db lint

      - name: Security & performance advisors
        run: supabase db advisors --fail-on error
